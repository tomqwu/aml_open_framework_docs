<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Deck · Multi-file Slide Index</title>
<!--
  deck_index.html — 多文件 slide deck 的拼接器

  配合「每页一个独立 HTML」架构使用。与单文件 deck_stage.js 对比：
  · 每页独立作用域（CSS/JS 都隔离），一页出 bug 不影响其他页
  · 单页可直接在浏览器打开验证，不依赖 JS goTo()
  · 多 agent 可并行做不同页，merge 时零冲突
  · 适合 ≥15 页的讲座/课件/长 deck

  用法：
    1. 把本文件复制到 deck 根目录，重命名 index.html
    2. 在同目录建 slides/ 子目录，放每一页独立 HTML
    3. 编辑下方 MANIFEST 数组，按顺序列出文件名和人类可读标签
    4. 每张 slide HTML 建议尺寸 1920×1080，自带背景/字体；不要依赖外层 CSS

  共享资源（如果需要）：
    · shared/tokens.css  — 跨页 CSS 变量（色板/字号）
    · shared/chrome.html — 页眉页脚可复用片段
    · 每页 HTML 自己 <link> 进去即可

  键盘：← / → / Space / PgUp / PgDown / Home / End / 1-9 跳页 / P 打印
-->

<!-- ═══════════════════════════════════════════════════════ -->
<!-- EDIT THIS — deck 所有页按顺序列出                        -->
<!-- ═══════════════════════════════════════════════════════ -->
<script>
  // Reordered for visual-first narrative + leadership-lens up front:
  //   1-3   Stun         — cover, hero product shot, six-screen gallery
  //   4-5   What & Who   — plain English, who benefits (per role)
  //   6-10  Lead Lens    — easier day, $ cost, day-in-5-lives, 3LoD, migration path
  //   11-12 Hook         — problem, thesis (after we've earned attention)
  //   13-17 Showcase     — Today, Audit, Detection, Effectiveness, Network
  //   18-21 Drill        — color, architecture, validation, rule logic, personas
  //   22-25 Reach        — multi-juris, ISO/sanctions, R7 gaps
  //   26-27 Close        — open-source proof, CTA
  window.DECK_MANIFEST = [
    { file: "slides/01-cover.html",                 label: "Cover" },
    { file: "slides/02-hero-product.html",          label: "The Product" },
    { file: "slides/18-real-product.html",          label: "Six Surfaces" },
    { file: "slides/plain-english.html",            label: "In Plain English" },
    { file: "slides/who-benefits.html",             label: "Who Benefits" },
    { file: "slides/easier-day-to-day.html",        label: "Easier Day-to-Day" },
    { file: "slides/cost-of-status-quo.html",       label: "Cost of Status Quo" },
    { file: "slides/day-in-five-lives.html",        label: "Day in Five Lives" },
    { file: "slides/three-lines-of-defence.html",   label: "Three Lines of Defence" },
    { file: "slides/migration-path.html",           label: "Migration Path" },
    { file: "slides/02-problem.html",               label: "The Problem" },
    { file: "slides/03-thesis.html",                label: "The Thesis" },
    { file: "slides/08-today-landing.html",         label: "Today Landing" },
    { file: "slides/11-audit-terminal.html",        label: "Audit &amp; Evidence" },
    { file: "slides/10-detection-arc.html",         label: "Detection Arc" },
    { file: "slides/12-effectiveness-funnel.html",  label: "Effectiveness" },
    { file: "slides/14-network-explorer.html",      label: "Network" },
    { file: "slides/09-rag-semantics.html",         label: "Color Discipline" },
    { file: "slides/04-architecture.html",          label: "Architecture" },
    { file: "slides/05-validation.html",            label: "Validation" },
    { file: "slides/06-rule-types.html",            label: "Rule Logic" },
    { file: "slides/07-personas.html",              label: "Personas" },
    { file: "slides/13-framework-alignment.html",   label: "Multi-Jurisdiction" },
    { file: "slides/15-iso-sanctions.html",         label: "Ingest &amp; Screen" },
    { file: "slides/16-regwatch-audit-pack.html",   label: "Round 7 Gaps" },
    { file: "slides/17-proof.html",                 label: "Open Source" },
    { file: "slides/19-cta.html",                   label: "Engage" },
  ];

  // 固定 canvas 尺寸。每页 HTML 都应该按这个尺寸设计。
  window.DECK_WIDTH = 1920;
  window.DECK_HEIGHT = 1080;
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", sans-serif;
  }
  #stage {
    position: fixed;
    top: 50%; left: 50%;
    transform-origin: top left;
    will-change: transform;
    background: #fff;
    box-shadow: 0 10px 60px rgba(0,0,0,0.4);
    /* size set by JS from DECK_WIDTH/HEIGHT */
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #fff;
  }
  /* Bottom-right control cluster: prev arrow / counter / next arrow.
   * Counter is clickable — opens the slide picker overlay. */
  .controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    align-items: stretch;
    gap: 6px;
    user-select: none;
  }
  .ctl-btn {
    background: rgba(0,0,0,0.65);
    color: #fff;
    border: 0;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    font-family: inherit;
  }
  .ctl-btn:hover {
    opacity: 1;
    background: rgba(0,0,0,0.85);
  }
  .ctl-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  .counter {
    background: rgba(0,0,0,0.65);
    color: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .counter:hover {
    opacity: 1;
    background: rgba(0,0,0,0.85);
  }
  .counter .label { color: rgba(255,255,255,0.7); }
  .counter .menu-icon {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    margin-left: 4px;
  }

  /* Slide picker overlay — toggled by clicking the counter. */
  .picker-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .picker-backdrop.open {
    display: flex;
    opacity: 1;
  }
  .picker {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 24px;
    max-width: 600px;
    max-height: 80vh;
    width: 90vw;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    color: #f1f5f9;
    font-family: -apple-system, "PingFang SC", sans-serif;
  }
  .picker h2 {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #94a3b8;
    margin: 0 0 16px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .picker h2 .total { color: #67e8f9; }
  .picker h2 .hint  { font-size: 10px; letter-spacing: 0.12em; color: #475569; }
  .picker ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .picker-item {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s ease;
    border: 1px solid transparent;
  }
  .picker-item:hover {
    background: rgba(103, 232, 249, 0.08);
  }
  .picker-item.current {
    background: rgba(103, 232, 249, 0.12);
    border-color: #67e8f9;
  }
  .picker-item .num {
    font-family: "JetBrains Mono", "SF Mono", monospace;
    font-size: 12px;
    color: #67e8f9;
    min-width: 32px;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }
  .picker-item .title {
    font-size: 15px;
    color: #f1f5f9;
    font-weight: 500;
  }
  .picker-item.current .title { color: #67e8f9; }
  .picker-item .check {
    margin-left: auto;
    color: #67e8f9;
    font-size: 14px;
    opacity: 0;
  }
  .picker-item.current .check { opacity: 1; }
  .nav-zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 15%;
    cursor: pointer;
    z-index: 50;
  }
  .nav-zone.left  { left: 0; }
  .nav-zone.right { right: 0; }
  .nav-hint {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .nav-zone.left  .nav-hint { left: 20px; }
  .nav-zone.right .nav-hint { right: 20px; }
  .nav-zone:hover .nav-hint { opacity: 1; }

  /* Print: one slide per page, no navigation UI */
  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    html, body { background: #fff; overflow: visible; height: auto; }
    #stage { position: static; transform: none !important; box-shadow: none; }
    .controls, .nav-zone, .picker-backdrop { display: none !important; }
    /* In print mode we render all slides sequentially — see JS */
    .print-stack { display: block; }
    .print-stack iframe {
      width: 1920px;
      height: 1080px;
      page-break-after: always;
      display: block;
    }
  }
</style>
</head>
<body>

<div id="stage">
  <iframe id="frame" src="about:blank"></iframe>
</div>

<div class="nav-zone left"  id="navL"><div class="nav-hint">‹</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>

<!-- Bottom-right control cluster: prev / counter (clickable for picker) / next -->
<div class="controls">
  <button class="ctl-btn" id="btnPrev" aria-label="Previous slide">‹</button>
  <div class="counter" id="counter" aria-label="Open slide picker"
       title="Click to jump to a specific slide">1 / 1<span class="menu-icon">⌘</span></div>
  <button class="ctl-btn" id="btnNext" aria-label="Next slide">›</button>
</div>

<!-- Slide picker overlay -->
<div class="picker-backdrop" id="pickerBackdrop">
  <div class="picker" id="picker">
    <h2>
      <span>JUMP TO SLIDE · <span class="total" id="pickerTotal">0</span></span>
      <span class="hint">ESC TO CLOSE</span>
    </h2>
    <ul id="pickerList"></ul>
  </div>
</div>

<!-- Print-only stack: populated on beforeprint, stripped on afterprint -->
<div class="print-stack" id="printStack" style="display:none;"></div>

<script>
(function () {
  const W = window.DECK_WIDTH || 1920;
  const H = window.DECK_HEIGHT || 1080;
  const deck = window.DECK_MANIFEST || [];
  const stage = document.getElementById('stage');
  const frame = document.getElementById('frame');
  const counter = document.getElementById('counter');
  const printStack = document.getElementById('printStack');
  const storageKey = 'deck-index-' + location.pathname;
  let current = 0;

  stage.style.width  = W + 'px';
  stage.style.height = H + 'px';

  function fit() {
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    const x = (window.innerWidth  - W * s) / 2;
    const y = (window.innerHeight - H * s) / 2;
    stage.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
    stage.style.top = '0';
    stage.style.left = '0';
  }

  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const pickerBackdrop = document.getElementById('pickerBackdrop');
  const pickerList = document.getElementById('pickerList');
  const pickerTotal = document.getElementById('pickerTotal');

  function show(idx) {
    if (idx < 0 || idx >= deck.length) return;
    current = idx;
    frame.src = deck[idx].file;
    counter.innerHTML =
      `${idx + 1} / ${deck.length} <span class="label">${deck[idx].label || ''}</span>` +
      '<span class="menu-icon">⌘</span>';
    if (location.hash !== '#' + (idx + 1)) {
      history.replaceState(null, '', '#' + (idx + 1));
    }
    // Update prev/next button enabled state.
    btnPrev.disabled = idx === 0;
    btnNext.disabled = idx === deck.length - 1;
    // Update picker current highlight if open.
    pickerList.querySelectorAll('.picker-item').forEach((el, i) => {
      el.classList.toggle('current', i === idx);
    });
  }

  function next() { show(Math.min(current + 1, deck.length - 1)); }
  function prev() { show(Math.max(current - 1, 0)); }

  // Slide picker — populate once on init.
  function buildPicker() {
    pickerTotal.textContent = deck.length;
    pickerList.innerHTML = deck.map((item, i) => `
      <li class="picker-item${i === current ? ' current' : ''}" data-idx="${i}">
        <span class="num">${String(i + 1).padStart(2, '0')}</span>
        <span class="title">${item.label || item.file}</span>
        <span class="check">✓</span>
      </li>
    `).join('');
    pickerList.querySelectorAll('.picker-item').forEach(el => {
      el.addEventListener('click', () => {
        show(parseInt(el.dataset.idx, 10));
        closePicker();
      });
    });
  }
  function openPicker() { pickerBackdrop.classList.add('open'); }
  function closePicker() { pickerBackdrop.classList.remove('open'); }
  function togglePicker() {
    if (pickerBackdrop.classList.contains('open')) closePicker();
    else openPicker();
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    // ESC closes the picker if open, otherwise no-op.
    if (e.key === 'Escape') {
      if (pickerBackdrop.classList.contains('open')) {
        closePicker();
        e.preventDefault();
        return;
      }
    }
    switch (e.key) {
      case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
      case 'ArrowLeft':  case 'PageUp':              e.preventDefault(); prev(); break;
      case 'Home':                                    e.preventDefault(); show(0); break;
      case 'End':                                     e.preventDefault(); show(deck.length - 1); break;
      case 'p': case 'P':                             window.print(); break;
      // 'M' / 'O' open the slide picker (menu / overview).
      case 'm': case 'M': case 'o': case 'O':         e.preventDefault(); togglePicker(); break;
      default:
        if (e.key >= '1' && e.key <= '9') {
          const i = parseInt(e.key, 10) - 1;
          if (i < deck.length) { e.preventDefault(); show(i); }
        }
    }
  });

  document.getElementById('navL').addEventListener('click', prev);
  document.getElementById('navR').addEventListener('click', next);
  btnPrev.addEventListener('click', (e) => { e.stopPropagation(); prev(); });
  btnNext.addEventListener('click', (e) => { e.stopPropagation(); next(); });
  counter.addEventListener('click', (e) => { e.stopPropagation(); togglePicker(); });
  pickerBackdrop.addEventListener('click', (e) => {
    // Click on backdrop (not the picker itself) closes the picker.
    if (e.target === pickerBackdrop) closePicker();
  });
  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', () => {
    const m = location.hash.match(/^#(\d+)$/);
    if (m) show(parseInt(m[1], 10) - 1);
  });

  // Initial: hash takes precedence; otherwise always start at slide 1.
  // (Cold opens should not resume a previous session — a pitch deck always
  // begins at the beginning. Direct deep-links via #N still work.)
  const hashMatch = location.hash.match(/^#(\d+)$/);
  if (hashMatch) current = Math.min(parseInt(hashMatch[1], 10) - 1, deck.length - 1);
  else current = 0;
  fit();
  buildPicker();
  show(current);

  // Print: build a stack of all iframes so browser prints every slide
  window.addEventListener('beforeprint', () => {
    printStack.innerHTML = '';
    deck.forEach(item => {
      const f = document.createElement('iframe');
      f.src = item.file;
      printStack.appendChild(f);
    });
    printStack.style.display = 'block';
    document.getElementById('stage').style.display = 'none';
  });
  window.addEventListener('afterprint', () => {
    printStack.innerHTML = '';
    printStack.style.display = 'none';
    document.getElementById('stage').style.display = '';
  });
})();
</script>

</body>
</html>
